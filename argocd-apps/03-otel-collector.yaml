apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: togglemaster
    app.kubernetes.io/component: observability
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: "0.97.1"
    helm:
      values: |
        mode: deployment
        replicaCount: 1

        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP
          prometheus:
            enabled: true
            containerPort: 8889
            servicePort: 8889
            protocol: TCP

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          processors:
            batch:
              timeout: 5s
              send_batch_size: 1024
            memory_limiter:
              check_interval: 5s
              limit_mib: 400
              spike_limit_mib: 100
            resource:
              attributes:
                - key: service.namespace
                  value: togglemaster
                  action: upsert
                - key: deployment.environment
                  value: production
                  action: upsert

          exporters:
            prometheusremotewrite:
              endpoint: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
              resource_to_telemetry_conversion:
                enabled: true

            loki:
              endpoint: "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
              default_labels_enabled:
                exporter: true
                job: true
                instance: true
                level: true

            # >>> SUBSTITUA <YOUR_NEW_RELIC_LICENSE_KEY> pela sua chave <<<
            otlp/newrelic:
              endpoint: "https://otlp.nr-data.net:4317"
              headers:
                api-key: "<YOUR_NEW_RELIC_LICENSE_KEY>"

            debug:
              verbosity: basic

          extensions:
            health_check:
              endpoint: 0.0.0.0:13133

          service:
            extensions: [health_check]
            pipelines:
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, resource, batch]
                exporters: [prometheusremotewrite, otlp/newrelic]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, resource, batch]
                exporters: [loki, otlp/newrelic]
              traces:
                receivers: [otlp]
                processors: [memory_limiter, resource, batch]
                exporters: [otlp/newrelic, debug]
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
