# Alertmanager Configuration Secret (versão cluster privado)
# Self-healing via webhook interno, sem dependência de credenciais AWS externas
#
# >>> SUBSTITUA os valores marcados com < > pelas suas chaves reais <<<
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: togglemaster
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service_name']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        # Alertas críticos com self-healing
        - match:
            severity: critical
            self_healing: "true"
          receiver: 'critical-with-healing'
          continue: false

        # Alertas críticos sem self-healing
        - match:
            severity: critical
          receiver: 'critical'
          continue: false

        # Alertas warning
        - match:
            severity: warning
          receiver: 'chatops-only'
          continue: false

    receivers:
      - name: 'default'
        webhook_configs: []

      - name: 'critical-with-healing'
        # 1) Abre incidente no OpsGenie
        opsgenie_configs:
          - api_key: "<YOUR_OPSGENIE_API_KEY>"
            message: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.service_name }}'
            description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            priority: P1
            tags: 'togglemaster,critical,auto-healing'

        webhook_configs:
          # 2) Notifica no Discord/Slack
          - url: "<YOUR_DISCORD_WEBHOOK_URL>"
            send_resolved: true

          # 3) Self-Healing: webhook INTERNO do cluster
          #    Aponta para o Service do pod self-healing-webhook
          - url: "http://self-healing-webhook.monitoring.svc.cluster.local:9095"
            send_resolved: false
            max_alerts: 1

      - name: 'critical'
        opsgenie_configs:
          - api_key: "<YOUR_OPSGENIE_API_KEY>"
            message: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.service_name }}'
            description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            priority: P2
            tags: 'togglemaster,critical'
        webhook_configs:
          - url: "<YOUR_DISCORD_WEBHOOK_URL>"
            send_resolved: true

      - name: 'chatops-only'
        webhook_configs:
          - url: "<YOUR_DISCORD_WEBHOOK_URL>"
            send_resolved: true

    # -----------------------------------------------------------
    # ALTERNATIVA SLACK: substitua webhook_configs por:
    #   slack_configs:
    #     - api_url: "<YOUR_SLACK_WEBHOOK_URL>"
