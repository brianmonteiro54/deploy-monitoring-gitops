apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: togglemaster
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service_name']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
            self_healing: "true"
          receiver: 'critical-with-healing'
          continue: false

        - match:
            severity: critical
          receiver: 'critical'
          continue: false

        - match:
            severity: warning
          receiver: 'chatops-only'
          continue: false

    receivers:
      - name: 'default'
        webhook_configs: []

      - name: 'critical-with-healing'
        pagerduty_configs:
          - service_key: "41d2abe602e74c0bc099440c1bc426db"
            description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.service_name }}'
            details:
              description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            severity: critical

        webhook_configs:
          # 2) Notifica no Discord/Slack
          - url: "<YOUR_DISCORD_WEBHOOK_URL>"
            send_resolved: true
          # 3) Self-Healing: webhook INTERNO do cluster
          #    Aponta para o Service do pod self-healing-webhook

          - url: "http://self-healing-webhook.monitoring.svc.cluster.local:9095"
            send_resolved: false
            max_alerts: 1

      - name: 'critical'
        pagerduty_configs:
          - service_key: "41d2abe602e74c0bc099440c1bc426db"
            description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.service_name }}'
            details:
              description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            severity: warning

        webhook_configs:
          - url: "<YOUR_DISCORD_WEBHOOK_URL>"
            send_resolved: true

      - name: 'chatops-only'
        webhook_configs:
          - url: "<YOUR_DISCORD_WEBHOOK_URL>"
            send_resolved: true