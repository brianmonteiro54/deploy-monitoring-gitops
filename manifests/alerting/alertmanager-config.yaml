apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: togglemaster
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service_name']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
            self_healing: "true"
          receiver: 'critical-with-healing'
          continue: false

        - match:
            severity: critical
          receiver: 'critical'
          continue: false

        - match:
            severity: warning
          receiver: 'chatops-only'
          continue: false

    receivers:
      - name: 'default'
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1495469678150156320/RFzHOg_O5iyWvNZHvn68ph5gTqXiMY2_HBwU9DWXQuG0XRi7uxHT0zCuCdJYcoA7E3C1"
            send_resolved: true
            title: '{{ .GroupLabels.alertname }}'
            message: |-
              {{ range .Alerts }}
              **{{ .Status | toUpper }}** {{ .Labels.service_name }}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}

      - name: 'critical-with-healing'
        # 1) PagerDuty — abre incidente
        pagerduty_configs:
          - service_key: "41d2abe602e74c0bc099440c1bc426db"
            description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.service_name }}'
            details:
              description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            severity: critical

        # 2) Discord — notifica via integração nativa
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1495469678150156320/RFzHOg_O5iyWvNZHvn68ph5gTqXiMY2_HBwU9DWXQuG0XRi7uxHT0zCuCdJYcoA7E3C1"
            send_resolved: true
            title: '🚨 [CRITICAL + SELF-HEALING] {{ .GroupLabels.alertname }}'
            message: |-
              {{ range .Alerts }}
              **Serviço:** {{ .Labels.service_name }}
              **Severity:** {{ .Labels.severity }}
              **Status:** {{ .Status | toUpper }}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}

        # 3) Self-Healing webhook (esse é webhook_configs normal, é um endpoint interno)
        webhook_configs:
          - url: "http://self-healing-webhook.monitoring.svc.cluster.local:9095"
            send_resolved: false
            max_alerts: 1

      - name: 'critical'
        pagerduty_configs:
          - service_key: "41d2abe602e74c0bc099440c1bc426db"
            description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.service_name }}'
            details:
              description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            severity: critical
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1495469678150156320/RFzHOg_O5iyWvNZHvn68ph5gTqXiMY2_HBwU9DWXQuG0XRi7uxHT0zCuCdJYcoA7E3C1"
            send_resolved: true
            title: '🔴 [CRITICAL] {{ .GroupLabels.alertname }}'
            message: |-
              {{ range .Alerts }}
              **Serviço:** {{ .Labels.service_name }}
              **Status:** {{ .Status | toUpper }}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}

      - name: 'chatops-only'
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1495469678150156320/RFzHOg_O5iyWvNZHvn68ph5gTqXiMY2_HBwU9DWXQuG0XRi7uxHT0zCuCdJYcoA7E3C1"
            send_resolved: true
            title: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
            message: |-
              {{ range .Alerts }}
              **Serviço:** {{ .Labels.service_name }}
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}